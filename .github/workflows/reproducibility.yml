name: Reproducibility

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-and-build:
    runs-on: ubuntu-24.04
    env:
      SOURCE_DATE_EPOCH: "1783890000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run numerical diagnostics
        run: python verification/verify.py

      - name: Regenerate figure
        run: python verification/make_figure.py --output artifacts/support_leakage_phase_diagram.png

      - name: Install Tectonic 0.16.9
        run: |
          curl -L --fail --retry 3 -o tectonic.tar.gz https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%400.16.9/tectonic-0.16.9-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf tectonic.tar.gz
          sudo install tectonic /usr/local/bin/tectonic
          tectonic --version

      - name: Compile manuscript
        run: tectonic -X compile paper/main.tex --outdir paper --keep-logs

      - name: Check release invariants
        run: python verification/check_release.py --generated-figure artifacts/support_leakage_phase_diagram.png

      - name: Reject PDF drift
        run: git diff --exit-code -- paper/main.pdf
